<!DOCTYPE html>
<head>
<html lang="en">
	<head charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strona</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
<style>
  


	body{
		background:#0000;
		color:#fff;
		font-family: "Roboto", sans-serif;
		font-optical-sizing: auto;
		font-weight: 400;
		font-style: normal;
		font-variation-settings: 100;
		background-color:black;
	}
	
	
	
	main{
		width:1024px;
		margin:auto;
		background:#0003;
		}


	#header{
	background: #292929;
	width:1024px;
	padding:1em;
	display:flex;
	justify-content:space-between; /* rozsuwa elementy na zewnątrz */
	}


	nav{
	display:flex; /* ustawia elementy obok siebie */
	gap:2em;
	font-size:1em;
		}

	li{
		list-style: none; /* USUWA KROPKI Z ELEMENTÓW LISTY  */
	}

	section{
		padding:2emm;
		margin:1em 0;
		border-radius: 0.5em;
		border:1px solid #ababab70;
	}


	.service{
		font-family:Roboto;
		display:flex;
		justify-content:space-between;
		align-items:center;
		font-size:1.3em;
		padding-bottom:1em;
		border-bottom:1px solid #292929;

	}
	.title{
		font-weight:bolder;
		font-size: 3em;
		line-height:1em;
		padding-bottom: -1em;
		
		}
	.longimg{
		width:400px;
		height:80px;
	
	}
	.orangeline{
		border:none;
		border-bottom:1px solid #dc5f00;
		position:relative;
		top:-1em;


	}


	.number{
		border:1px solid #ababab44;
		padding:0.5em;
		margin-right:1em;
		border-radius:0.2em;
		background:#292929;



	}


</style>
</head>
<body>
	<main>

		<section id="header">
		DARKYN
		<nav>
		<li>HOME</li>
		<li>ABOUT</li>
		<li>WORK</li>
		<li>BLOG</li>
		<li>CONTACT</li>
		</section>
		<section id="hero">HERO</section>
		<section id="slider">SLIDER</section>
		<section id="scores">SCORES</section>
		<section id="services">
			<div class="title">SERVICES</div>
			<hr class="orangeline">
			<div class="service">
				<div>
					<span class="number">01</span>
					<span>BRAND DESIGN</span>
				</div>
				<img class="longimg" src="https://demoxml.com/wp/darkyn/wp-content/uploads/2025/03/branding-1024x233.jpg">
			</div>
			</section>	
		<section id="whoweare">WHOWEARE</section>
		<section id="work">WORK</section>
		<section id="testimonials">TESTIMONIALS</section>
		<section id="insights">INSIGHTS</section>
		<section id="contacts">CONTACTS</section>
	</main>
</body>
</html>
